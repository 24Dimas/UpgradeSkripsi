<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Panel administrator Si-Reino — Kesbangpol Kudus">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0a2a5e">
  <title>Login Admin · Si-Reino</title>
  <link rel="icon" type="image/png" href="../src/admin.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tokens.css">
  <style>
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:var(--sp-4);background:radial-gradient(ellipse at 15% 25%,rgba(30,90,174,.1) 0%,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(212,171,84,.08) 0%,transparent 55%),var(--ink-50)}
    .login-card{background:var(--white);border:1px solid var(--ink-200);border-radius:var(--rad-xl);box-shadow:var(--shadow-lg);width:100%;max-width:420px;overflow:hidden;animation:cardIn .4s var(--ease-out)}
    @keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .login-hero{background:linear-gradient(160deg,var(--brand-900),var(--brand-700));padding:var(--sp-6) var(--sp-5);text-align:center;border-bottom:3px solid var(--gold-400)}
    .login-avatar{width:64px;height:64px;border-radius:var(--rad-md);background:rgba(255,255,255,.15);border:2px solid rgba(212,171,84,.4);display:grid;place-items:center;margin:0 auto var(--sp-3);font-size:28px;color:var(--white);animation:glow 3s ease-in-out infinite}
    @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(212,171,84,0)}50%{box-shadow:0 0 16px 4px rgba(212,171,84,.25)}}
    .login-title{color:var(--white);font-size:var(--fs-lg);font-weight:700;margin-bottom:2px}
    .login-sub{color:rgba(255,255,255,.7);font-size:var(--fs-xs);font-weight:500}
    .login-body{padding:var(--sp-6) var(--sp-5)}
    .lockout-banner{display:none;background:var(--danger-100);border:1px solid rgba(185,28,28,.2);border-radius:var(--rad-md);padding:var(--sp-3);font-size:var(--fs-sm);color:var(--danger-600);text-align:center;margin-bottom:var(--sp-4);font-weight:500}
    .lockout-banner.show{display:block}
    .back-row{text-align:center;margin-top:var(--sp-4);font-size:var(--fs-xs);color:var(--ink-500)}
    .back-row a{color:var(--brand-700);font-weight:600;text-decoration:none}
    .back-row a:hover{text-decoration:underline}
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-hero">
    <div class="login-avatar"><i class="bi bi-shield-lock-fill"></i></div>
    <div class="login-title">Login Admin</div>
    <div class="login-sub">Kesbangpol Kabupaten Kudus</div>
  </div>
  <div class="login-body">
    <div class="alert alert-danger" id="errorMsg" role="alert" style="display:none;margin-bottom:var(--sp-4)">
      <i class="bi bi-x-circle-fill"></i>
      <div id="errorText">Username atau password salah.</div>
    </div>
    <div class="lockout-banner" id="lockoutBanner">
      <i class="bi bi-shield-exclamation"></i> Terlalu banyak percobaan. Coba lagi dalam <strong id="lockoutTimer">30</strong> detik.
    </div>
    <div class="field">
      <label for="username" class="field-label">Username</label>
      <div class="field-input-icon">
        <i class="bi bi-person-fill"></i>
        <input type="text" id="username" class="field-input" placeholder="Masukkan username" autocomplete="username">
      </div>
    </div>
    <div class="field">
      <label for="password" class="field-label">Password</label>
      <div class="field-input-icon field-input-trail">
        <i class="bi bi-lock-fill"></i>
        <input type="password" id="password" class="field-input" placeholder="Masukkan password" autocomplete="current-password">
        <button type="button" class="trail-btn" id="togglePw"><i class="bi bi-eye-fill" id="pwEyeIcon"></i></button>
      </div>
    </div>
    <button class="btn btn-primary btn-block btn-lg" id="btnLogin" onclick="doLogin()">
      <i class="bi bi-box-arrow-in-right"></i><span>Masuk ke Dashboard</span>
    </button>
    <div class="back-row"><a href="../index.html"><i class="bi bi-arrow-left"></i> Kembali ke halaman utama</a></div>
  </div>
</div>
<script src="../assets/config.js"></script>
<script>
const APPS_SCRIPT_URL = window.SIREINO_CONFIG.API_URL;
let failedAttempts=0;const MAX_ATTEMPTS=3,LOCKOUT_SEC=30;
document.getElementById("togglePw").addEventListener("click",function(){const pw=document.getElementById("password"),ic=document.getElementById("pwEyeIcon");if(pw.type==="password"){pw.type="text";ic.classList.replace("bi-eye-fill","bi-eye-slash-fill")}else{pw.type="password";ic.classList.replace("bi-eye-slash-fill","bi-eye-fill")}});
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&!document.getElementById("btnLogin").disabled)doLogin()});
function showErr(m){document.getElementById("errorText").innerHTML=m;document.getElementById("errorMsg").style.display="flex"}
function hideErr(){document.getElementById("errorMsg").style.display="none"}
function startLockout(){const b=document.getElementById("lockoutBanner"),t=document.getElementById("lockoutTimer"),btn=document.getElementById("btnLogin");b.classList.add("show");btn.disabled=true;let r=LOCKOUT_SEC;t.textContent=r;const iv=setInterval(()=>{r--;if(r<=0){clearInterval(iv);b.classList.remove("show");btn.disabled=false;failedAttempts=0;hideErr();return}t.textContent=r},1000)}
async function doLogin(){const u=document.getElementById("username").value.trim(),p=document.getElementById("password").value,btn=document.getElementById("btnLogin");
if(!u||!p){showErr("Username dan password wajib diisi.");return}
btn.innerHTML='<span class="spinner"></span><span>Memverifikasi...</span>';btn.disabled=true;hideErr();
try{const enc=new TextEncoder(),buf=await crypto.subtle.digest("SHA-256",enc.encode(p)),hash=Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
const body=new URLSearchParams({action:"login",username:u,password:hash}),res=await fetch(APPS_SCRIPT_URL,{method:"POST",body}),data=await res.json();
if(data.success){sessionStorage.setItem("adminLoggedIn","true");sessionStorage.setItem("adminUser",u);window.location.href="dashboard.html"}
else{failedAttempts++;const rem=MAX_ATTEMPTS-failedAttempts;
if(rem>0){showErr(`Username atau password salah. Sisa percobaan: ${rem}`);btn.innerHTML='<i class="bi bi-box-arrow-in-right"></i><span>Masuk ke Dashboard</span>';btn.disabled=false}
else{btn.innerHTML='<i class="bi bi-box-arrow-in-right"></i><span>Masuk ke Dashboard</span>';startLockout()}}}
catch(e){showErr("Gagal terhubung ke server.");btn.innerHTML='<i class="bi bi-box-arrow-in-right"></i><span>Masuk ke Dashboard</span>';btn.disabled=false}}
</script>
</body>
</html>
